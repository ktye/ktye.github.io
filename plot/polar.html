<!DOCTYPE html>
<head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>polar</title>
<style>*{font-size:large;font-family:monospace}
body{display:flex;flex-flow:column}
svg{border:1px solid #ddd;width:100%}
table{outline:none;}
th{text-align:left}
.b1{border-top:1px solid}
</style>
</head>

<body>
<svg     id="svg" width="350" height="350"></svg>
<table id="T"></table>
<script src="plot.js"></script>
<script>
let L=x=>(console.log(x),x)
let p=[
 {Type:"polar",Lines:[{C:[0.866025,0.499999,0.919253,0.771345,0.565685,0.565685]}]},
]
let colors="#003FFF,#03ED3A,#E8000B,#8A2BE2,#FFC400,#00D7FF".split(",")
let phase=a=>a/180*pi
let show=t=>{p[0].Lines=[];
 let c=[],sum=[0,0]
 let s=`<tr><th>#</th><th>+/-</th></th><th>amount</th><th>angle</th></tr>\n`
 t.forEach((x,i)=>{let sn=x.pm=='+'?1:-1;X=sn*x.u*cos(phase(x.a)),Y=sn*x.u*sin(phase(x.a)); console.log("X",X,"Y",Y,x);c.push(X,Y); p[0].Lines.push({C:[X,Y],Style:{Marker:{Size:8}}}); sum[0]+=X;sum[1]+=Y; s+=`<tr><td style='color:${colors[i%colors.length]}'>${1+i}</td><td>${x.pm}</td><td>${x.u}</td><td>${x.a}</td></tr>\n`})
 s+=`<tr><td class='b1' style='color:${colors[t.length%colors.length]}'>${1+t.length}</td><td class='b1'>sum</td><td class='b1'>${hypot(sum[0],sum[1]).toFixed(3)}</td><td class='b1'>${Ang(sum)[0].toFixed(1)}</td></tr>\n`
 T.innerHTML=s
 p[0].Lines.push({C:[sum[0],sum[1]],Style:{Marker:{Size:8}}});
 plot(p,0,svg,0,0,0,0,"cols",0)
}
show([{pm:'-',u:3.14,a:14.4},{pm:'+',u:2.4,a:153},{pm:'+',u:1.14,a:122}])
//m.src="data:image/svg,"+encodeURIComponent(L(plot(p,"width",350,"height",350,"cols",0)))
</script>
</body>
</html>

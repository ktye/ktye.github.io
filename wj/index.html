let hi=x=>(i.setSelectionRange(x=+x.textContent.slice(1),1+x),i.focus())

let wtest=(W,a)=>{a.filter(x=>x[0]=="test").forEach((x,i)=>{let X=x=>x.T=="j"?BigInt(x[1]):(+x[1])
  if(!W.exports[x[2][1]]){throw new Error(`test ${i} ${x[2][1]} is not exported`)}
  let e=X(x[1]),a=x.slice(3).map(X),f=W.exports[x[2][1]],r=f(...a);if(r!=e){throw new Error(`test(wa) ${i}: expected ${e} got ${r}`)}})}

const example={
func:`
function add(x,y){return x+y}
function Sub(X,Y){return X-Y}
function mulf(xf,yf){return xf*yf}
function _none(x,y){x^y}
exp(add,Sub)         //exports

test(3,add,1,2)      //test if 3==add(1,2)
test(2n,Sub,4n,2n)
`,
globals:`

test(57,t)

memory:`

convert:`

`,
unsigned:`//ints are signed, but unsigned operators exist as function calls:

`,
conditionals:`

function te(x){return x<3?-1:-2}            //ternary expression

test(4,ie,0)
test(2,ie,3)
test(-1,te,2)

`,
loops:`
function l1(x,y){while(x<y)x*=2;return x}

alloc:`
